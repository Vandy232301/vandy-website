  let total = 10 * 60;
  function tick() {
    const m = Math.floor(total / 60);
    const s = total % 60;
    const iframe = document.querySelector('#panel-5 iframe');
    if (!iframe || !iframe.contentDocument) return;
    const min = iframe.contentDocument.getElementById('cd-min');
    const sec = iframe.contentDocument.getElementById('cd-sec');
    if (min) min.textContent = String(m).padStart(2,'0');
    if (sec) sec.textContent = String(s).padStart(2,'0');
    if (total <= 0) { clearInterval(countdownInterval); return; }
    total--;
  }
  setTimeout(() => { tick(); countdownInterval = setInterval(tick, 1000); }, 800);
}
</script>
</body>
</html>
